# fly.toml - Fly.io Deployment Config
app = "whale-alert-service"
primary_region = "sjc"

[build]
  [[build.buildpacks]]
    uri = "heroku/buildpacks:20"

[env]
  PORT = "8888"
  PYTHON_VERSION = "3.12"

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = false  # Keep running 24/7
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "15m"
  timeout = "10s"
  grace_period = "5s"
  method = "GET"
  path = "/api/health"

[deploy]
  strategy = "canary"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
